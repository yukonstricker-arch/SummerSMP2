# ===== SummerSMPCore config =====

# Max Maces (heavy cores) allowed to exist on the server AT ONCE.
# Destroying one frees a slot so a new heavy core can be found.
mace-limit: 3

# Announce in chat when a heavy core is claimed or a mace is destroyed.
announce-heavy-core-claims: true

# Default reason used when /ban is run without a reason.
default-ban-reason: "Banned by staff"

# Combat tagging (anti combat-logging).
combat:
  # Seconds you stay "in combat" after hitting / being hit by a player.
  tag-seconds: 20
  # Commands blocked while you are in combat (no leading slash). Namespaced
  # versions (e.g. essentials:tpa) are matched automatically.
  blocked-commands:
    - rtp
    - tpa
    - tpahere
    - tpaccept
    - home
    - sethome
    - spawn
    - back
    - warp
    - tp
    - tphere
    - tpo
    - teleport
    - tppos
    - top
    - world
    - hub
    - lobby

# Random teleport (/rtp).
rtp:
  radius: 5000
  min-radius: 100
  cooldown-seconds: 30
  max-attempts: 24

# Teleport requests (/tpa, /tpahere).
tpa:
  request-seconds: 60
